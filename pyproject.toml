[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "antidetect-firefox"
version = "0.1.0"
description = "Antidetect browser profile manager for the patched Firefox (manual use)."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "feder-cr", email = "85809106+feder-cr@users.noreply.github.com" }]
dependencies = [
    "invisible-core @ git+https://github.com/feder-cr/invisible_core.git",
    "platformdirs>=4",
    "PySide6-Essentials>=6.6",
]

[project.optional-dependencies]
dev = ["pytest>=7", "pytest-qt>=4"]

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/antidetect_firefox"]

[tool.pytest.ini_options]
addopts = "-m 'not integration'"
markers = ["integration: launches a real firefox-13 binary"]
